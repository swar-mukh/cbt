name=cbt
description=cbt (C++ Build Tool) is a postmodern build tool intended towards developing applications in C++ effortlessly.
version=2026-02-06

authors[]=Swarnava Mukherjee:swar_mukh10@yahoo.co.in

platforms[]=bsd
platforms[]=linux
platforms[]=macos
platforms[]=unix
platforms[]=windows

config{cpp_standard}=c++2a
config{safety_flags}=-Wall -Wextra -pedantic
config{compile_time_flags}=-Os -s
config{build_flags}=-O3 -Os -s
config{test_flags}=-g -Og -s
